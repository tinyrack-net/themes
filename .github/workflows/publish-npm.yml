name: Publish npm package

on:
  push:
    tags:
      - "ui-v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @tinyrack/ui
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @tinyrack/ui exec playwright install --with-deps chromium firefox

      - name: Verify tag matches package version
        run: |
          package_version="ui-v$(node -p "require('./packages/ui/package.json').version")"
          if [ "$package_version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

      - name: Verify package
        run: pnpm run verify

      - name: Publish package to npm
        run: pnpm --dir packages/ui publish --provenance --access public --no-git-checks
