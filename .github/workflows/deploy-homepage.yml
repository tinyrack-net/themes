name: Deploy homepage

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: homepage-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy homepage to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @tinyrack/homepage exec playwright install --with-deps chromium

      - name: Build and audit static documentation
        run: pnpm run test:docs

      - name: Deploy homepage to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run docs:deploy
