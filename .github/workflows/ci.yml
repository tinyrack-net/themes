name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare package outputs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workspace formatting
        run: pnpm run biome

      - name: Build packages in dependency order
        run: pnpm run build

      - name: Pack prepared UI dependency
        run: |
          mkdir -p .tmp/prebuilt
          pnpm --config.ignore-scripts=true --dir packages/ui pack --pack-destination "$GITHUB_WORKSPACE/.tmp/prebuilt"

      - name: Upload prepared outputs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: prepared-workspace
          path: |
            .tmp/prebuilt
            packages/ui/dist
            packages/docs/dist
            packages/homepage/build
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  ui:
    name: UI package
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared outputs
        uses: actions/download-artifact@v8.0.1
        with:
          name: prepared-workspace
          path: .

      - name: Install browser engines
        run: pnpm --filter @tinyrack/ui exec playwright install --with-deps chromium firefox

      - name: Check UI package
        run: pnpm --filter @tinyrack/ui check

      - name: Test UI package
        env:
          TINYRACK_TEST_PREBUILT: "true"
        run: |
          export TINYRACK_UI_TARBALL="$(realpath .tmp/prebuilt/*.tgz)"
          pnpm --filter @tinyrack/ui test

  docs:
    name: Docs package
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared outputs
        uses: actions/download-artifact@v8.0.1
        with:
          name: prepared-workspace
          path: .

      - name: Check docs package
        run: pnpm --filter @tinyrack/docs check

      - name: Test docs package
        env:
          TINYRACK_TEST_PREBUILT: "true"
        run: |
          export TINYRACK_UI_TARBALL="$(realpath .tmp/prebuilt/*.tgz)"
          pnpm --filter @tinyrack/docs test

  homepage:
    name: Homepage package
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download prepared outputs
        uses: actions/download-artifact@v8.0.1
        with:
          name: prepared-workspace
          path: .

      - name: Install Chromium
        run: pnpm --filter @tinyrack/homepage exec playwright install --with-deps chromium

      - name: Check homepage package
        run: pnpm --filter @tinyrack/homepage check

      - name: Test homepage package
        env:
          TINYRACK_TEST_PREBUILT: "true"
        run: pnpm --filter @tinyrack/homepage test

      - name: Upload homepage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: homepage-client
          path: packages/homepage/build/client
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  deploy-homepage:
    name: Deploy homepage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - ui
      - docs
      - homepage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download homepage artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: homepage-client
          path: packages/homepage/build/client

      - name: Deploy homepage to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run docs:deploy
