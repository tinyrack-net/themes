name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-docs:
    name: Workspace and docs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify source workspace
        run: pnpm run test:source

      - name: Check workspace formatting
        run: pnpm run biome

      - name: Verify docs package
        run: pnpm --filter @tinyrack/docs verify

  ui-package:
    name: UI package
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @tinyrack/ui exec playwright install --with-deps chromium

      - name: Verify UI package
        run: pnpm --filter @tinyrack/ui verify:static

  ui-firefox:
    name: UI Firefox
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Firefox
        run: pnpm --filter @tinyrack/ui exec playwright install --with-deps firefox

      - name: Test UI in Firefox
        run: pnpm --filter @tinyrack/ui exec vitest run --project browser --browser.name firefox

  ui-coverage:
    name: UI coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @tinyrack/ui exec playwright install --with-deps chromium

      - name: Verify UI coverage
        run: pnpm --filter @tinyrack/ui test:coverage

  homepage:
    name: Homepage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @tinyrack/homepage exec playwright install --with-deps chromium

      - name: Verify homepage
        run: pnpm --filter @tinyrack/homepage verify

      - name: Upload homepage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: homepage-client
          path: packages/homepage/build/client
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 1

  deploy-homepage:
    name: Deploy homepage
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - workspace-docs
      - ui-package
      - ui-firefox
      - ui-coverage
      - homepage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up JavaScript runtime
        uses: ./.github/actions/setup-js

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download homepage artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: homepage-client
          path: packages/homepage/build/client

      - name: Deploy homepage to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run docs:deploy
