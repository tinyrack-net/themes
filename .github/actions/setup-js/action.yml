name: Set up JavaScript runtime
description: Set up pnpm from package.json and Node.js from .node-version.

inputs:
  registry-url:
    description: Optional npm registry URL for publishing.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Read pnpm version
      id: pnpm
      shell: bash
      run: |
        pnpm_version="$(node -p "require('./package.json').packageManager.split('@')[1]")"
        echo "version=${pnpm_version}" >> "$GITHUB_OUTPUT"

    - name: Set up pnpm
      uses: pnpm/action-setup@v6.0.9
      with:
        version: ${{ steps.pnpm.outputs.version }}

    - name: Set up Node.js
      if: inputs.registry-url == ''
      uses: actions/setup-node@v6.4.0
      with:
        cache: pnpm
        node-version-file: .node-version

    - name: Set up Node.js with npm registry
      if: inputs.registry-url != ''
      uses: actions/setup-node@v6.4.0
      with:
        cache: pnpm
        node-version-file: .node-version
        registry-url: ${{ inputs.registry-url }}
